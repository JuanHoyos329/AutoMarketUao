version: "3.8"

services:
  # Base de datos para Usuarios
  users-db:
    image: mysql:8.0
    container_name: users-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: usersautomarketuao
    ports:
      - "3307:3306"
    networks:
      - automarket-network
    volumes:
      - users_data:/var/lib/mysql

  # Base de datos para Trámites
  tramites-db:
    image: mysql:8.0
    container_name: tramites-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: backtramites
    ports:
      - "3308:3306"
    networks:
      - automarket-network
    volumes:
      - tramites_data:/var/lib/mysql

  # Base de datos para Publicaciones (Spring Boot)
  publicaciones-db:
    image: mysql:8.0
    container_name: publicaciones-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: automarketuao
    ports:
      - "3309:3306"
    networks:
      - automarket-network
    volumes:
      - publicaciones_data:/var/lib/mysql

  # Microservicio de Usuarios (JavaScript)
  users-service:
    build: ./User
    container_name: users-service
    restart: always
    depends_on:
      - users-db
    environment:
      DB_HOST: users-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: usersautomarketuao
    ports:
      - "8081:5000"
    networks:
      - automarket-network

  # Microservicio de Trámites (JavaScript)
  tramites-service:
    build: ./Tramites
    container_name: tramites-service
    restart: always
    depends_on:
      - tramites-db
    environment:
      DB_HOST: tramites-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: backtramites
    ports:
      - "8082:5000"
    networks:
      - automarket-network

  # Microservicio de Publicaciones (Java Spring Boot)
  publicaciones-service:
    build: ./Publicaciones
    container_name: publicaciones-service
    restart: always
    depends_on:
      - publicaciones-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://publicaciones-db:3306/automarketuao?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    networks:
      - automarket-network

networks:
  automarket-network:

volumes:
  users_data:
  tramites_data:
  publicaciones_data:

